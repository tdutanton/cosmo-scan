services:
  postgres:
    image: postgres:15
    container_name: cosmo-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: storing_db
    ports:
      - "5432:5432"
    networks:
      - cosmo-scan-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  analysis-db:
    image: postgres:15
    container_name: analysis-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analysis_db
    ports:
      - "5433:5432"
    networks:
      - cosmo-scan-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  file-storing:
    build:
      context: ./file-storing-service
      dockerfile: Dockerfile
    container_name: file-storing
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - FILE_STORAGE_PATH=/app/uploads
      - ANALYSIS_SERVICE_URL=http://analysis-service:8082
    ports:
      - "8080:8080"
    networks:
      - cosmo-scan-net
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  analysis-service:
    build:
      context: ./file-analysis-service
      dockerfile: Dockerfile
    container_name: analysis-service
    depends_on:
      analysis-db:
        condition: service_healthy
      file-storing:
        condition: service_healthy
    environment:
      - SERVER_PORT=8082
      - DB_HOST=analysis-db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - FILE_STORAGE_PATH=/app/uploads
    ports:
      - "8082:8082"
    networks:
      - cosmo-scan-net
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    depends_on:
      file-storing:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
    environment:
      - GATEWAY_PORT=8081
      - STORING_SERVICE_URL=http://file-storing:8080
      - ANALYSIS_SERVICE_URL=http://analysis-service:8082
    ports:
      - "8081:8081"
    networks:
      - cosmo-scan-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  cosmo-scan-net:
    driver: bridge
    name: cosmo-scan-net
