server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/storing_db?sslmode=disable&connectTimeout=10&socketTimeout=30
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

file:
  storage:
    path: ${FILE_STORAGE_PATH:./uploads}

analysis:
  service:
    url: ${ANALYSIS_SERVICE_URL:http://analysis-service:8082}
