server:
  port: 8081

spring:
  cloud:
    gateway:
      routes:
        - id: file-storing-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/students/**, /api/files/**
        - id: file-analysis-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/analysis/**

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
